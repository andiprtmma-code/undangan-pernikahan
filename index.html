<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Undangan Pernikahan - Nama Kalian</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Great+Vibes&family=Montserrat:wght@300;400;600&display=swap" rel="stylesheet">
    <link href="https://unpkg.com/aos@2.3.1/dist/aos.css" rel="stylesheet">
    
    <style>
        body { font-family: 'Montserrat', sans-serif; }
        .font-wedding { font-family: 'Great Vibes', cursive; }
        .parallax {
            background-attachment: fixed;
            background-position: center;
            background-repeat: no-repeat;
            background-size: cover;
        }
    </style>
</head>
<body class="bg-stone-50 text-stone-800 overflow-x-hidden">

    <section class="relative h-screen flex items-center justify-center text-center text-white parallax" 
             style="background-image: linear-gradient(rgba(0,0,0,0.5), rgba(0,0,0,0.5)), url('https://images.unsplash.com/photo-1519741497674-611481863552?q=80&w=2070');">
        <div data-aos="fade-up" data-aos-duration="2000">
            <h2 class="text-2xl mb-4 tracking-widest uppercase">The Wedding of</h2>
            <h1 class="text-7xl md:text-9xl font-wedding mb-6">Andi & Sari</h1>
            <p class="text-lg italic">12 . 12 . 2026</p>
        </div>
    </section>

    <section class="py-20 px-6 max-w-4xl mx-auto text-center">
        <h2 class="text-3xl font-wedding text-amber-700 mb-12" data-aos="fade-up">Assalamu’alaikum Wr. Wb.</h2>
        <div class="grid md:grid-cols-2 gap-12 items-center">
            <div data-aos="fade-right">
                <img src="https://images.unsplash.com/photo-1550005816-09246d377488?w=500" alt="Pria" class="w-48 h-48 mx-auto rounded-full object-cover border-4 border-amber-200 shadow-xl mb-4">
                <h3 class="text-2xl font-wedding text-amber-800">Andi Pratama</h3>
                <p class="text-sm">Putra dari Bapak Fulan & Ibu Fulanah</p>
            </div>
            <div data-aos="fade-left">
                <img src="https://images.unsplash.com/photo-1511285560929-80b456fea0bc?w=500" alt="Wanita" class="w-48 h-48 mx-auto rounded-full object-cover border-4 border-amber-200 shadow-xl mb-4">
                <h3 class="text-2xl font-wedding text-amber-800">Sari Puspita</h3>
                <p class="text-sm">Putri dari Bapak Fulan & Ibu Fulanah</p>
            </div>
        </div>
    </section>

    <section class="bg-stone-100 py-20 px-4">
        <div class="max-w-6xl mx-auto">
            <h2 class="text-4xl font-wedding text-center text-amber-800 mb-12" data-aos="zoom-in">Momen Bahagia Kami</h2>
            <div class="columns-1 md:columns-3 gap-4 space-y-4">
                <img src="https://images.unsplash.com/photo-1583939003579-730e3918a45a?w=600" class="rounded-lg shadow-md hover:scale-105 transition duration-500" data-aos="fade-up">
                <img src="https://images.unsplash.com/photo-1519225495045-3b829623030c?w=600" class="rounded-lg shadow-md hover:scale-105 transition duration-500" data-aos="fade-up">
                <img src="https://images.unsplash.com/photo-1522673607200-1648832cee98?w=600" class="rounded-lg shadow-md hover:scale-105 transition duration-500" data-aos="fade-up">
                <img src="https://images.unsplash.com/photo-1465495910483-0d6745778736?w=600" class="rounded-lg shadow-md hover:scale-105 transition duration-500" data-aos="fade-up">
                <img src="https://images.unsplash.com/photo-1515934751635-c81c6bc9a2d8?w=600" class="rounded-lg shadow-md hover:scale-105 transition duration-500" data-aos="fade-up">
            </div>
        </div>
    </section>

    <footer class="py-16 text-center bg-stone-800 text-white">
        <h2 class="text-3xl font-wedding mb-4">Terima Kasih</h2>
        <p class="mb-8 px-6">Merupakan suatu kehormatan bagi kami atas kehadiran Bapak/Ibu/Saudara/i.</p>
        <button class="bg-amber-600 hover:bg-amber-700 text-white px-8 py-3 rounded-full transition shadow-lg">
            Konfirmasi Kehadiran (RSVP)
        </button>
    </footer>

    <script src="https://unpkg.com/aos@2.3.1/dist/aos.js"></script>
    <script>
        AOS.init({ duration: 1000, once: true });
    </script>
</body>
</html>
